services:
  research-remote-executor:
    build:
      context: ../..
      dockerfile: deploy/remote-executor/Dockerfile
    container_name: wechat-research-remote-executor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - ./docker.env
    volumes:
      - research-executor-data:/data/research-executor
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.WECHAT_CLI_BRIDGE_REMOTE_EXECUTOR_PORT || '8081') + '/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  research-executor-data:
